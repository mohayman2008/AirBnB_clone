<!Doctype html>
<html>
	<head>
		<meta charset="utf-8">
		<title>AirBnB Clone</title>
		<link rel="icon" type="image/png" href="images/icon.png">
		<link rel="stylesheet" href="styles/4-common.css">
		<link rel="stylesheet" href="styles/3-header.css">
		<link rel="stylesheet" href="styles/3-footer.css">
		<link rel="stylesheet" href="styles/6-filters.css">
		<link rel="stylesheet" href="styles/8-places.css">
	</head>
    <body>
			<header>
				<section class="logo"></section>
			</header>

			<div class="container">
				<section class="filters">
					<div class="locations">
						<h3>States</h3>
						<h4>Some Text!</h4>
						<ul class="popover">
							<li>
								<h2>State 1</h2>
								<ul>
									<li>City 1</li>
									<li>City 2</li>
								</ul>
							</li>
							<li>
								<h2>State 2</h2>
								<ul>
									<li>City 3</li>
									<li>City 4</li>
								</ul>
							</li>
						</ul>
					</div>

					<div class="amenities">
						<h3>Amenities</h3>
						<h4>Some Text!</h4>
						<ul class="popover">
							<li>Internet</li>
							<li>TV</li>
							<li>Internet</li>
							<li>TV</li>
						</ul>
					</div>
					<button class="search-btn">Search</button>
				</section>
        <section class="places">
          <h1>Places</h1>
          <article>
            <h2>Studio</h2>
			<div class="price_by_night">$80</div>
			<div class="information">
				<div class="max_guest">
					<div class="icon"></div>
					<center>3 Guests</center>
				</div>
				<div class="number_rooms">
					<div class="icon"></div>
					<center>3 Bedrooms</center>
				</div>
				<div class="number_bathrooms">
					<div class="icon"></div>
					<center>2 Bathrooms</center>
				</div>
			</div>
			<div class="user"><strong>Owner: </strong>John Doe</div>
			<div class="description">Description for the place!</div>
          </article>
          <article>
            <h2>Lake house</h2>
          </article>
          <article>
            <h2>Suite</h2>
          </article>
        </section>
			</div>

			<footer>
				<span>Best School</span>
			</footer>
    </body>
</html>
